apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "furnace.fullname" . }}
  labels:
    {{- include "furnace.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "furnace.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "furnace.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: furnace
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ include "furnace.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/etc/furnace/config.yaml
          ports:
            - name: http
              containerPort: 8025
              protocol: TCP
            - name: protocol
              containerPort: 8026
              protocol: TCP
          env:
            {{- if or .Values.config.apiKey .Values.config.scimKey }}
            {{- if .Values.config.apiKey }}
            - name: FURNACE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "furnace.fullname" . }}
                  key: FURNACE_API_KEY
            {{- end }}
            {{- if .Values.config.scimKey }}
            - name: FURNACE_SCIM_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "furnace.fullname" . }}
                  key: FURNACE_SCIM_KEY
            {{- end }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/furnace
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "furnace.fullname" . }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "furnace.fullname" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
