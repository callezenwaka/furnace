version: 2

project_name: terraform-provider-furnace

before:
  hooks:
    - go mod tidy

builds:
  - id: terraform-provider-furnace
    binary: "{{ .ProjectName }}_v{{ .Version }}"
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: furnace
  # Terraform Registry release notes format
  name_template: "terraform/{{ .Tag }}"

changelog:
  disable: true  # changelog managed at the monorepo level
