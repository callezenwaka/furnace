version: 2

project_name: furnace

before:
  hooks:
    - sh -c "cd client && npm ci && npm run build"
    - go mod tidy

builds:
  - id: furnace
    main: ./server/cmd/furnace
    binary: furnace
    env:
      - CGO_ENABLED=0
    tags:
      - prod
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: furnace
    builds: [furnace]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: furnace
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## Furnace {{ .Version }}

    Docker image: `ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/furnace:{{ .Version }}`

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"
