services:
  authpilot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8025:8025"
      - "8026:8026"
    environment:
      AUTHPILOT_HTTP_ADDR: ":8025"
      AUTHPILOT_PROTOCOL_ADDR: ":8026"
      AUTHPILOT_PERSISTENCE_ENABLED: "true"
      AUTHPILOT_SQLITE_PATH: "/data/authpilot.db"
    volumes:
      - authpilot_data:/data

volumes:
  authpilot_data:
