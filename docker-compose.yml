services:
  furnace:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8025:8025"
      - "8026:8026"
    environment:
      FURNACE_HTTP_ADDR: ":8025"
      FURNACE_PROTOCOL_ADDR: ":8026"
      FURNACE_PERSISTENCE_ENABLED: "true"
      FURNACE_SQLITE_PATH: "/data/furnace.db"
    volumes:
      - furnace_data:/data

volumes:
  furnace_data:
